server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # long cache for hashed assets
  location ~* \.(?:js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|webp|ico|mp4)$ {
    access_log off;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback — every unknown route returns index.html so react-router handles it
  location / {
    try_files $uri $uri/ /index.html;
  }

  # no-cache for index.html so updated builds roll out immediately
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }
}
